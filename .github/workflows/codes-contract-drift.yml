name: CODES contract drift
on:
  # Schedule + manual only — deliberately no push/pull_request triggers, so this
  # workflow never appears in a PR's checks (not even as "skipped"). The pinned
  # per-PR gate lives in codes-contract.yml.
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

# Weekly drift check: builds CODES against a freshly-installed ROSS using
# codes-org/codes@master (floating, not the pinned SHA in codes-contract.yml).
# A red here means CODES@master has moved past what the pinned CODES_REF
# validates — investigate, then bump CODES_REF in codes-contract.yml if
# appropriate. Minimal CODES build (SWM, UNION, DUMPI, TORCH off), same as the
# pinned job.

jobs:
  codes-contract-master:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout ROSS
        uses: actions/checkout@v4
        with:
          path: ross

      - name: Checkout CODES (master)
        uses: actions/checkout@v4
        with:
          repository: codes-org/codes
          ref: master
          path: codes

      - name: Install MPICH
        run: |
          sudo apt-get update
          sudo apt-get install -y mpich libmpich-dev pkg-config

      - name: Configure ROSS
        run: cmake -S ross -B ross/build -DROSS_BUILD_MODELS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_INSTALL_PREFIX=$PWD/ross-install

      - name: Build ROSS
        run: cmake --build ross/build -j

      - name: Install ROSS
        run: cmake --install ross/build

      - name: Configure CODES against installed ROSS
        run: cmake -S codes -B codes/build -DROSS_PKG_CONFIG_PATH=$PWD/ross-install/lib/pkgconfig -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DUSE_TORCH=false

      - name: Build CODES
        run: cmake --build codes/build -j

      - name: Run CODES tests
        run: ctest --test-dir codes/build --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codes-contract-master-logs
          path: |
            codes/build/Testing/Temporary/LastTest.log
            codes/build/Testing/Temporary/LastTestsFailed.log
            codes/build/CMakeFiles/CMakeError.log
            codes/build/CMakeFiles/CMakeOutput.log
            codes/build/CMakeCache.txt
            ross/build/CMakeFiles/CMakeError.log
            ross/build/CMakeFiles/CMakeOutput.log
            ross/build/CMakeCache.txt
          if-no-files-found: ignore
          retention-days: 14
